<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #d9e4f5, #f7f9fc);
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .login-container, .dashboard-container{
            background:white;
            padding:30px;
            width:700px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#2c3e50;
        }

        h3{
            color:#34495e;
            margin-top:20px;
        }

        select,input,button{
            width:90%;
            margin:10px 0;
            padding:12px;
            font-size:15px;
            border-radius:6px;
        }

        input,select{
            border:1px solid #ccc;
        }

        button{
            background:#3498db;
            color:white;
            border:none;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        button:hover{
            background:#2980b9;
        }

        #message{
            margin-top:10px;
            color:red;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table th, table td{
            padding:10px;
            border:1px solid #ccc;
            text-align:center;
        }

        table th{
            background:#3498db;
            color:white;
        }

        table tr:nth-child(even){
            background:#f2f2f2;
        }

        #content{
            margin-top:20px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Attendance Management System</h1>

    <select id="role">
        <option value="admin">Admin</option>
        <option value="teacher">Teacher</option>
        <option value="student">Student</option>
    </select>

    <input type="text" id="username" placeholder="Enter Username / RollNo">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="loginUser()">Login</button>
    <p style="margin-top:15px;">
        New Student? <a href="register.html">Register Here</a>
    </p>

    <p id="message"></p>
</div>

<script src="js/login.js"></script>
</body>
</html>
